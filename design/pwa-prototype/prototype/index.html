<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jekotech Garage · PWA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
  #root { width: 100%; height: 100%; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="customer-app.jsx"></script>
<script type="text/babel" src="booking-flow.jsx"></script>
<script type="text/babel" src="admin-app.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "view": "split",
  "theme": "industrial",
  "userMode": "existing",
  "step": 0,
  "screen": "home",
  "adminTab": "schedule"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // theme overrides
  React.useEffect(() => {
    const themes = {
      industrial: { bone: '#F2EFEA', ink: '#0B0D0E', orange: '#FF5A1F' },
      light:      { bone: '#FFFFFF', ink: '#1A1A1A', orange: '#FF5A1F' },
      dark:       { bone: '#1A1A1A', ink: '#0B0D0E', orange: '#FF8C42' },
    };
    const th = themes[t.theme] || themes.industrial;
    Object.assign(window.JK, th);
  }, [t.theme]);

  const renderCustomer = () => {
    const screen = t.screen === 'auth' ? 'auth' : t.screen === 'book' ? 'book' : t.screen;
    return (
      <IOSDevice>
        <div style={{ width: '100%', height: '100%', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <IOSStatusBar dark={true}/>
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
            <CustomerApp initialScreen={screen} userMode={t.userMode} step={t.step}/>
          </div>
        </div>
      </IOSDevice>
    );
  };

  const renderAdmin = () => (
    <div style={{
      width: 1280, height: 820, background: '#0B0D0E',
      border: `1px solid #2A2F33`, boxShadow: '0 30px 80px rgba(0,0,0,0.4)',
      overflow: 'hidden', display: 'flex',
    }}>
      <AdminApp initialTab={t.adminTab}/>
    </div>
  );

  return (
    <DesignCanvas>
      {t.view !== 'admin' && (
        <DCSection id="customer" title="Customer PWA · Mobile" subtitle="Auth → 8-step booking → dashboard">
          <DCArtboard id="cust-1" label="Mobile prototype · live" width={400} height={820}>
            {renderCustomer()}
          </DCArtboard>
        </DCSection>
      )}

      {t.view !== 'customer' && (
        <DCSection id="admin" title="Admin Console · Desktop / Tablet" subtitle="Schedule, mechanics, customers, WhatsApp, analytics, sync">
          <DCArtboard id="adm-1" label="Owner dashboard · 1280×820" width={1280} height={820}>
            {renderAdmin()}
          </DCArtboard>
        </DCSection>
      )}

      <TweaksPanel>
        <TweakSection label="View"/>
        <TweakRadio label="Show" value={t.view} options={[
          {value:'split', label:'Both'}, {value:'customer', label:'Customer'}, {value:'admin', label:'Admin'}
        ]} onChange={v => setTweak('view', v)}/>
        <TweakSelect label="Theme" value={t.theme}
          options={[{value:'industrial',label:'Industrial (default)'},{value:'light',label:'Light'},{value:'dark',label:'Dark'}]}
          onChange={v => setTweak('theme', v)}/>

        <TweakSection label="Customer flow"/>
        <TweakSelect label="Screen" value={t.screen}
          options={[
            {value:'auth', label:'Auth (login/signup)'},
            {value:'home', label:'Home dashboard'},
            {value:'book', label:'Booking flow'},
            {value:'history', label:'Service log'},
            {value:'account', label:'Account settings'},
          ]}
          onChange={v => setTweak('screen', v)}/>
        <TweakRadio label="User type" value={t.userMode} options={[
          {value:'existing', label:'Existing'}, {value:'new', label:'New signup'}
        ]} onChange={v => setTweak('userMode', v)}/>
        {t.screen === 'book' && (
          <TweakSlider label="Booking step" value={t.step} min={0} max={7} step={1}
            onChange={v => setTweak('step', v)} unit="" />
        )}

        <TweakSection label="Admin"/>
        <TweakSelect label="Tab" value={t.adminTab}
          options={[
            {value:'schedule', label:'Schedule'},
            {value:'mechanics', label:'Mechanics'},
            {value:'customers', label:'Customers'},
            {value:'whatsapp', label:'WhatsApp log'},
            {value:'analytics', label:'Analytics'},
            {value:'sync', label:'QB Sync'},
          ]}
          onChange={v => setTweak('adminTab', v)}/>
      </TweaksPanel>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
